{% extends "base.html" %}

{% block content %}

<div class="flex items-center justify-center min-h-screen">

<div class="w-full max-w-md bg-gray-800 p-8 rounded-xl shadow-lg">

<h2 class="text-2xl font-bold text-center mb-6">
Reset Password
</h2>

<form method="POST" onsubmit="showResetSuccess(event)">

<!-- NEW PASSWORD -->

<div class="relative mb-4">
<input
type="password"
name="password"
id="password"
placeholder="New Password"
required
class="w-full p-3 rounded bg-gray-700"
/>

<span
onclick="togglePassword('password')"
class="absolute right-3 top-3 cursor-pointer">
👁
</span>
</div>

<!-- CONFIRM PASSWORD -->

<div class="relative mb-4">
<input
type="password"
name="confirm_password"
id="confirm_password"
placeholder="Confirm Password"
required
class="w-full p-3 rounded bg-gray-700"
/>

<span
onclick="togglePassword('confirm_password')"
class="absolute right-3 top-3 cursor-pointer">
👁
</span>
</div>

<button
class="w-full bg-green-500 hover:bg-green-600 p-3 rounded font-semibold">

Reset Password

</button>

</form>

</div>

</div>

<script>
function togglePassword(id){
    const field = document.getElementById(id);
    if(field.type === "password"){
        field.type = "text";
    }else{
        field.type = "password";
    }
}
</script>


<div id="resetSuccessPopup" class="success-popup">

<div class="success-box">

<div class="checkmark-circle">
<div class="background"></div>
<div class="checkmark draw"></div>
</div>

<h3>Password Reset Successful</h3>
<p>Your password has been updated successfully.</p>

</div>

</div>

{% endblock %}
