{% extends "base.html" %}

{% block content %}

<div class="max-w-md mx-auto mt-20 bg-gray-800 p-8 rounded-xl shadow-lg">

<h2 class="text-2xl font-bold text-center mb-6">
Forgot Password
</h2>

<form method="POST" onsubmit="showSuccess(event)">

<input
type="email"
name="email"
placeholder="Enter your registered email"
required
class="w-full p-3 rounded bg-gray-700 mb-4"
/>

<button
type="submit"
class="w-full bg-blue-500 hover:bg-blue-600 p-3 rounded font-semibold">

Send Reset Link

</button>

</form>

<p class="text-center mt-4 text-sm">
<a href="/" class="text-blue-400">Back to Login</a>
</p>

</div>




<div id="successPopup" class="success-popup">

<div class="success-box">

<div class="checkmark-circle">
<div class="background"></div>
<div class="checkmark draw"></div>
</div>

<h3>Email Sent Successfully</h3>
<p>Password reset link sent to your email.</p>

</div>

</div>

{% endblock %}
