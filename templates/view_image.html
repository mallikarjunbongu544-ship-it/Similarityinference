{% extends "base.html" %}
{% block content %}

<div class="min-h-screen flex items-center justify-center px-6 py-10">

    <div class="glass p-6 rounded-2xl shadow-2xl max-w-4xl w-full text-center relative">

        <!-- Fullscreen Button -->
        <button onclick="openFullscreen()"
            class="absolute top-4 right-4
                   bg-white/10 hover:bg-white/20
                   px-3 py-1 rounded-lg
                   text-white text-sm transition">
            ⛶
        </button>

        <h2 class="text-xl text-indigo-300 mb-4">
            Image Preview
        </h2>

        <img id="previewImage"
             src="{{ url_for('view_file', filename=filename) }}"
             class="max-h-[70vh] mx-auto rounded-xl shadow-lg">

        <div class="mt-6">
            <a href="{{ url_for('dashboard') }}"
               class="text-indigo-400 hover:text-indigo-300">
                ← Back to Dashboard
            </a>
        </div>

    </div>

</div>

<script>
function openFullscreen() {
    let img = document.getElementById("previewImage");
    if (img.requestFullscreen) {
        img.requestFullscreen();
    }
}
</script>

{% endblock %}
