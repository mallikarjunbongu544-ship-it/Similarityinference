{% extends "base.html" %}
{% block content %}

<div class="flex justify-center items-center h-[85vh] fade-in">

  <div class="glass p-10 rounded-2xl w-[500px] text-center shadow-2xl">

    <form id="uploadForm" enctype="multipart/form-data">

      <!-- Hidden File Input -->
      <input type="file"
             id="fileInput"
             name="image"
             accept="image/*"
             class="hidden">

      <input type="text"
            name="label"
            placeholder="Enter Image Title (e.g., Amazon Logo)"
            class="w-full p-3 rounded-lg bg-white/10 border border-white/20 mt-3"
            required>

      <!-- Upload Box -->
      <div id="dropArea"
           class="cursor-pointer border-2 border-dashed border-indigo-400
                  rounded-xl p-10 text-gray-300 hover:bg-white/5 transition">

          <p id="uploadText">Click or Drag & Drop an image</p>

          <img id="imagePreview"
               class="mt-4 mx-auto rounded-lg hidden max-h-60">
      </div>

      <!-- File Name -->
      <p id="fileName"
         class="mt-3 text-sm text-indigo-300 hidden"></p>

      <!-- Managing Filename -->
      <p id="managingText"
         class="text-gray-400 text-sm mt-1 hidden"></p>

      <!-- Button -->
      <button type="button"
            id="analyzeBtn"
            onclick="uploadFile()"
            class="mt-6 bg-indigo-600 hover:bg-indigo-700 transition
                px-6 py-3 rounded-lg font-semibold w-full
                flex items-center justify-center">
        <span id="btnText">Analyze Image</span>
      </button>

      <button type="button"
          id="cancelBtn"
          class="mt-3 bg-red-600 hover:bg-red-700 transition
               px-6 py-2 rounded-lg font-semibold w-full hidden">
        Cancel Upload
      </button>

      <!-- Progress Bar -->
      <div id="progressContainer"
           class="mt-4 w-full bg-gray-700 rounded-lg h-4 hidden">
          <div id="progressBar"
               class="bg-indigo-500 h-4 rounded-lg"
               style="width: 0%;">
          </div>
      </div>

      <p id="progressText"
         class="text-sm text-indigo-300 mt-2 hidden">
         Uploading: 0%
      </p>

    </form>

  </div>

</div>

<!-- DUPLICATE IMAGE MODAL -->
<div id="duplicateModal"
class="fixed inset-0 bg-black/70 backdrop-blur-md hidden items-center justify-center z-50">

<div class="glass p-10 rounded-2xl text-center shadow-2xl w-[420px] border border-red-400/30">

<h2 class="text-2xl font-bold text-red-400 mb-3">
⚠ Duplicate Image Detected
</h2>

<p id="duplicateMessage" class="text-gray-300 mb-4"></p>

<!-- 🔥 NEW: Similarity Score -->
<p id="similarityScore" class="text-red-300 font-semibold mb-4"></p>

<!-- 🔥 NEW: Highlight Image -->
<img id="highlightImage"
     class="hidden rounded-lg mx-auto mb-4 border border-red-400"/>

<button onclick="closeDuplicateModal()"
class="mt-4 bg-indigo-600 hover:bg-indigo-700 transition
px-6 py-2 rounded-lg font-semibold text-white">
OK
</button>

</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {

    const dropArea = document.getElementById("dropArea");
    const fileInput = document.getElementById("fileInput");
    const form = document.getElementById("uploadForm");

    const preview = document.getElementById("imagePreview");
    const fileName = document.getElementById("fileName");
    const uploadText = document.getElementById("uploadText");
    const managingText = document.getElementById("managingText");

    const progressBar = document.getElementById("progressBar");
    const progressContainer = document.getElementById("progressContainer");
    const progressText = document.getElementById("progressText");

    const cancelBtn = document.getElementById("cancelBtn");
    const loader = document.getElementById("loader");

    let currentXhr = null;

    // Click Upload Box
    dropArea.addEventListener("click", () => fileInput.click());

    // File Selected
    fileInput.addEventListener("change", function(e) {

        if (!e.target.files.length) {
            fileInput.value = "";
            preview.classList.add("hidden");
            fileName.classList.add("hidden");
            managingText.classList.add("hidden");
            uploadText.textContent = "Click or Drag & Drop an image";
            return;
        }

        previewImage(e);
    });

    // Drag Over
    dropArea.addEventListener("dragover", function(e) {
        e.preventDefault();
        dropArea.classList.add("bg-white/10");
    });

    dropArea.addEventListener("dragleave", function() {
        dropArea.classList.remove("bg-white/10");
    });

    // Drop Files
    dropArea.addEventListener("drop", function(e) {
        e.preventDefault();
        dropArea.classList.remove("bg-white/10");

        fileInput.files = e.dataTransfer.files;
        previewImage({ target: fileInput });
    });

    // Image Preview
    function previewImage(event) {

        const files = event.target.files;

        if (!files.length) return;

        let names = [];

        for (let i = 0; i < files.length; i++) {
            names.push(files[i].name);
        }

        fileName.textContent = "Selected: " + names.join(", ");
        fileName.classList.remove("hidden");

        uploadText.textContent = files.length + " Images Selected ✔";

        // Managing filename
        managingText.textContent = "Managing " + files[0].name;
        managingText.classList.remove("hidden");

        preview.src = URL.createObjectURL(files[0]);
        preview.classList.remove("hidden");
    }

});
</script>

<script>

function resetButton(){
    const analyzeBtn = document.getElementById("analyzeBtn");
    const btnText = document.getElementById("btnText");
    analyzeBtn.disabled = false;
    analyzeBtn.classList.remove("opacity-70","cursor-not-allowed");
    btnText.textContent = "Analyze Image";
}

function showError(message) {

    const div = document.createElement("div");

    div.innerHTML = `
        <div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
            <div class="bg-white text-black p-6 rounded-xl shadow-xl text-center w-80">
                <p class="mb-4 font-semibold">${message}</p>
                <button class="bg-indigo-600 text-white px-4 py-2 rounded"
                        onclick="this.closest('.fixed').remove()">
                    OK
                </button>
            </div>
        </div>
    `;

    document.body.appendChild(div);
}

let toastTimeout;

function showToast(message, type = "error") {

    const toast = document.getElementById("toast");
    const toastMessage = document.getElementById("toastMessage");
    const toastIcon = document.getElementById("toastIcon");
    const toastProgress = document.getElementById("toastProgress");

    toastMessage.textContent = message;

    toast.className =
        "fixed top-6 right-6 z-50 flex flex-col " +
        "min-w-[320px] max-w-sm rounded-2xl border backdrop-blur-lg bg-white/10 " +
        "shadow-2xl transition-all duration-300 ease-in-out overflow-hidden";

    toastProgress.className =
        "h-full transition-all duration-[3000ms] ease-linear w-full";

    if (type === "error") {
        toast.classList.add("border-red-400","text-red-300");
        toastIcon.textContent = "⚠";
        toastProgress.classList.add("bg-red-400");
    } else {
        toast.classList.add("border-green-400","text-green-300");
        toastIcon.textContent = "✔";
        toastProgress.classList.add("bg-green-400");
    }

    toast.classList.add("translate-x-20","opacity-0");
    toast.classList.remove("pointer-events-none");

    setTimeout(() => {
        toast.classList.remove("translate-x-20","opacity-0");
        toast.classList.add("translate-x-0","opacity-100");
    }, 10);

    setTimeout(() => {
        toastProgress.style.width = "0%";
    }, 50);

    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(() => {
        hideToast();
    }, 3000);
}

function hideToast() {
    const toast = document.getElementById("toast");
    const toastProgress = document.getElementById("toastProgress");

    toast.classList.remove("translate-x-0","opacity-100");
    toast.classList.add("translate-x-20","opacity-0");

    toastProgress.style.width = "100%";

    setTimeout(() => {
        toast.classList.add("pointer-events-none");
    }, 300);
}

function openDuplicateModal(score, highlightUrl){

    if(score === undefined || score === null){
        score = 0
    }   // ✅ prevents undefined

    const modal = document.getElementById("duplicateModal")
    const label = document.querySelector("input[name='label']").value
    const msg = document.getElementById("duplicateMessage")

    msg.innerHTML = `
        "${label}" is <b>${score ?? 0}% similar</b> to an existing image.<br><br>
        🔍 Highlighted similar region:
        <br>
        ${highlightUrl ? `<img src="${highlightUrl}" class="mt-3 rounded-lg"/>` : "Not available"}
    `

    modal.classList.remove("hidden")
    modal.classList.add("flex")
}


function closeDuplicateModal(){
    const modal = document.getElementById("duplicateModal")
    modal.classList.remove("flex")
    modal.classList.add("hidden")
}

function uploadFile(){

    const form = document.getElementById("uploadForm");
    const formData = new FormData(form);

    const analyzeBtn = document.getElementById("analyzeBtn");
    const btnText = document.getElementById("btnText");

    analyzeBtn.disabled = true;
    btnText.textContent = "Analyzing...";

    fetch("/upload", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {

        if(data.status === "duplicate"){
            openDuplicateModal(data.score, data.highlight);
        }
        else if(data.status === "unique" || data.status === "borderline"){
            showToast("Image uploaded successfully", "success");
            setTimeout(() => {
                window.location.href = "/dashboard";
            }, 1200);
        }
        else if(data.status === "error"){
            showError(data.message);
        }

        resetButton();
    })
    .catch(err => {
        console.error(err);
        showError("Upload failed");
        resetButton();
    });
}

</script>

{% endblock %}
