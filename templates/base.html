<!DOCTYPE html>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>

/* =========================
   BODY
========================= */

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b,#312e81);
min-height:100vh;
margin:0;
overflow-x:hidden;
color:white;
}

/* =========================
   GLASS CARD
========================= */

.glass{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,0.15);
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* =========================
   PAGE FADE
========================= */

.page{
animation:fade .5s ease;
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

/* =========================
   TOAST
========================= */

.toast{
transform:translateX(120%);
opacity:0;
transition:all .5s ease;
}

.toast.show{
transform:translateX(0);
opacity:1;
}

/* =========================
   PROGRESS BAR
========================= */

@keyframes progressBar{
from{width:100%}
to{width:0%}
}

.progress{
animation:progressBar 5s linear forwards;
}

/* =========================
   ERROR MODAL
========================= */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.65);
align-items:center;
justify-content:center;
z-index:999;
}

.modal-content{
background:#1e293b;
padding:30px;
border-radius:12px;
text-align:center;
width:350px;
border:2px solid red;
animation:blinkGlow 1s infinite alternate;
}

@keyframes blinkGlow{
from{box-shadow:0 0 10px red}
to{box-shadow:0 0 25px red}
}

/* =========================
   FLASH POPUP
========================= */

.toast-overlay{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:rgba(0,0,0,0.7);
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.toast-box{
background:#1e293b;
padding:30px;
border-radius:12px;
width:350px;
text-align:center;
border:2px solid red;
animation:blinkGlow 1s infinite alternate;
box-shadow:0 0 15px red;
}

.toast-box h2{
font-size:22px;
margin-bottom:10px;
font-weight:600;
color:#f87171;
}

.toast-box p{
color:#e5e7eb;
margin-bottom:20px;
font-size:15px;
}

.toast-box button{
background:#ef4444;
padding:8px 20px;
border-radius:8px;
cursor:pointer;
border:none;
color:white;
font-weight:500;
transition:0.2s;
}

.toast-box button:hover{
background:#dc2626;
transform:scale(1.05);
}

</style>

</head>


<body>

<!-- =========================
     NAVBAR
========================= -->

AI Image Analyzer

<a href="/upload" class="hover:text-indigo-300 transition">

{% if session.get("role") == "admin" %}

</a>

Logout

</nav>


<!-- =========================
     ERROR MODAL
========================= -->


<!-- ERROR MODAL -->

<div id="errorModal" class="modal">

<div class="modal-content">

<h2 class="text-xl font-bold text-red-400 mb-4">
Error

class="bg-red-500 hover:bg-red-600 px-6 py-2 rounded-lg">

</div>

</div>

<!-- LOGOUT CONFIRM MODAL -->

<button onclick="closeLogoutModal()" class="bg-gray-500 hover:bg-gray-600 px-6 py-2 rounded-lg">

</button>

</div>

</div>

</div>

========================= -->

<div class="page">

</div>

<script>

function showSuccess(event){

event.preventDefault();

const popup = document.getElementById("successPopup");

popup.classList.add("show");

setTimeout(function(){

popup.classList.remove("show");

event.target.submit();

},2000);

}

function showResetSuccess(event){

event.preventDefault();

const popup = document.getElementById("resetSuccessPopup");

popup.classList.add("show");

setTimeout(function(){

popup.classList.remove("show");

event.target.submit();

},2000);

}

</script>


<!-- TOAST CONTAINER -->
<div id="toast-container" class="fixed top-5 right-5 z-50 space-y-3"></div>

<script>
function showToast(message, type="success") {

    const glassToast = document.getElementById("toast")

    // If glass toast exists → use it
    if(glassToast){

        const toastMessage = document.getElementById("toastMessage")
        const toastIcon = document.getElementById("toastIcon")
        const toastProgress = document.getElementById("toastProgress")

        toastMessage.innerText = message

        if(type === "success"){
            toastIcon.innerText="✔"
            toastProgress.style.background="#22c55e"
        }else{
            toastIcon.innerText="⚠"
            toastProgress.style.background="#ef4444"
        }

        glassToast.classList.remove("translate-x-20","opacity-0","pointer-events-none")

        setTimeout(()=>{
            glassToast.classList.add("translate-x-20","opacity-0")
        },3000)

        return
    }

    // fallback → simple toast (your old one)
    const container = document.getElementById("toast-container")

    const toast = document.createElement("div")

    toast.className =
    "px-6 py-3 rounded-lg shadow-lg text-white font-semibold"

    if(type === "success"){
        toast.classList.add("bg-green-500")
    }else{
        toast.classList.add("bg-red-500")
    }

    toast.innerText = message

    container.appendChild(toast)

    setTimeout(()=>{
        toast.remove()
    },3000)
}
</script>

<script src="{{ url_for('static', filename='script.js') }}"></script>
